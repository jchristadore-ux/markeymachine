{% extends "base.html" %}
{% block title %} · Sign up{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>Create your account</h1>
  <p class="muted small">Start in paper (practice) mode — no real money, no card.</p>
  <form method="post">
    <label>Email
      <input type="email" name="email" value="{{ email }}" autofocus required>
    </label>
    <label>Password <span class="muted small">(at least 8 characters)</span>
      <input type="password" name="password" minlength="8" required>
    </label>
    <button type="submit" class="btn primary">Sign up</button>
  </form>
  <p class="muted small">Already have an account? <a href="{{ url_for('login') }}">Log in</a>.</p>
</div>
{% endblock %}
