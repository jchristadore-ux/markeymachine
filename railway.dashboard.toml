# Railway config for the DASHBOARD service (separate from the bot service).
#
# Both services deploy from this same repo, and Railway's config-in-code
# overrides the dashboard UI's "Custom Start Command" — so the bot's
# railway.toml ("python bot.py") would otherwise win on the dashboard service
# too and crash it (the bot requires Kalshi credentials). To avoid that, point
# the dashboard service at THIS file:
#   Dashboard service → Settings → Config-as-code / "Railway Config File"
#   → set the path to:  railway.dashboard.toml   → then Redeploy.
#
# The bot service keeps using the default railway.toml. Nothing here touches the
# trader.
# Production WSGI server (gunicorn), bound to the port Railway injects ($PORT,
# falling back to 8080). A single worker keeps the in-process supervisor/account
# state coherent; threads handle concurrent browser requests. Railway routes the
# public domain to this port automatically.
[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn dashboard.app:app --bind 0.0.0.0:${PORT:-8080} --workers 1 --threads 8 --timeout 120"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
